<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Enterprise - SEDES GDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-radius: 1.5rem; transition: all 0.3s ease; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .active-view-btn { background: #4f46e5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200 p-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase">Portal <span class="text-indigo-600">SEDES GDF</span> Intelligence</h1>
            <div id="statusTag" class="bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold animate-pulse">CARREGANDO...</div>
        </div>
    </header>

    <main class="container mx-auto px-6 mt-10 space-y-10">
        <div class="glass-card p-6 flex flex-wrap items-center gap-6 border-l-8 border-indigo-600">
            <select id="mSel" class="bg-slate-50 font-bold text-sm px-6 py-2 rounded-xl border-none outline-none text-slate-600">
                <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3" selected>Março</option>
                <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
            </select>
            <select id="gSel" class="bg-indigo-50 font-bold text-sm px-6 py-2 rounded-xl border-none outline-none text-indigo-700">
                <option value="ALL">REDE COMPLETA</option>
                <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                <option value="OSC & POSTO">C: OSC & POSTO</option>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-card p-6 bg-slate-900 text-white shadow-2xl"><p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Volume 2026</p><h2 class="text-4xl font-black text-[#bef264]" id="v26">---</h2><div id="vVar" class="text-[10px] font-bold mt-2">---</div></div>
            <div class="glass-card p-6"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Pico do Mês</p><h2 class="text-3xl font-black text-indigo-600" id="vPeak">---</h2></div>
            <div class="glass-card p-6 border-b-4 border-orange-400"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Mediana Diária</p><h2 class="text-3xl font-black text-orange-500" id="vMed">---</h2></div>
            <div class="glass-card p-6 border-b-4 border-emerald-500"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Projeção Final</p><h2 class="text-3xl font-black text-emerald-600" id="vProj">---</h2></div>
        </div>

        <div class="glass-card p-10 flex flex-col"><h3 class="text-xs font-black text-slate-400 uppercase mb-10 tracking-[0.2em] italic">Timeline de Produção YoY</h3><div class="chart-container"><canvas id="mainC"></canvas></div></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-10"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic text-center">Esforço por Grupo</h3><div class="chart-container" style="height:300px;"><canvas id="donutC"></canvas></div></div>
            <div class="glass-card p-10"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic">Principais Unidades</h3><div id="uGrid" class="space-y-4"></div></div>
        </div>
    </main>

    <script>
        let biData, biDetails, unitMapping, charts = {};
        const G_COLORS = {"CRAS / CREAS / CENTRO POP": "#4f46e5","UNIDADE ACOLHIMENTO": "#a855f7","OSC & POSTO": "#f59e0b","CECON / GESTÃO": "#64748b"};

        async function start() {
            try {
                const [d, dt, m] = await Promise.all([
                    fetch('./data/bi_data_v4.json').then(r => r.json()),
                    fetch('./data/bi_details_v4.json').then(r => r.json()),
                    fetch('./data/unit_mapping_v4.json').then(r => r.json())
                ]);
                biData = d; biDetails = dt; unitMapping = m;
                document.getElementById('statusTag').innerText = "MODO REAL-TIME";
                document.getElementById('mSel').onchange = render;
                document.getElementById('gSel').onchange = render;
                render();
            } catch (e) { document.getElementById('statusTag').innerText = "ERRO DE DADOS"; }
        }

        function getM(arr) {
            const s = arr.slice().sort((a,b)=>a-b);
            const m = Math.floor(s.length/2);
            return s.length % 2 !== 0 ? s[m] : (s[m-1]+s[m])/2;
        }

        function render() {
            const m = parseInt(document.getElementById('mSel').value);
            const g = document.getElementById('gSel').value;
            const filtered = biData.filter(d => (g==='ALL' || d.g === g));

            const getV = (y) => {
                const r = Array(31).fill(0);
                filtered.filter(d => d.y === y && d.m === m).forEach(x => { r[x.d-1] += x.t; });
                return r;
            };

            const d26v = getV(2026); const d25v = getV(2025);
            const t26 = d26v.reduce((a,b)=>a+b, 0);
            const t25 = d25v.reduce((a,b)=>a+b, 0);
            const maxD26 = d26v.filter(x => x > 0).length;

            document.getElementById('v26').innerText = t26.toLocaleString();
            document.getElementById('vPeak').innerText = Math.max(...d26v).toLocaleString();
            
            const med = getM([...d26v, ...d25v].filter(x => x > 0));
            document.getElementById('vMed').innerText = Math.round(med || 0).toLocaleString();

            const t25Comp = d25v.slice(0, maxD26 || 31).reduce((a,b)=>a+b, 0);
            if(t25Comp > 0) {
                const diff = ((t26-t25Comp)/t25Comp*100).toFixed(1);
                document.getElementById('vVar').innerText = `${diff>0?'+':''}${diff}% vs 2025`;
            }

            if(maxD26 > 0) document.getElementById('vProj').innerText = Math.round((t26/maxD26)*30).toLocaleString();

            // Line Chart
            if(charts.l) charts.l.destroy();
            charts.l = new Chart(document.getElementById('mainC'), { type: 'line', data: {
                labels: Array.from({length:31},(_,i)=>i+1),
                datasets: [
                    { label: '2026', data: d26v.map(v=>v>0?v:null), borderColor: '#4f46e5', borderWidth: 5, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4 },
                    { label: '2025', data: d25v.map(v=>v>0?v:null), borderColor: '#cbd5e1', borderWidth: 2, fill: false, tension: 0.2 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false } }});

            // Donut Chart
            if(charts.d) charts.d.destroy();
            const gs = {}; biData.filter(d => d.y===2026 && d.m===m).forEach(x => gs[x.g] = (gs[x.g]||0)+x.t);
            charts.d = new Chart(document.getElementById('donutC'), { type: 'doughnut', data: { labels: Object.keys(gs), datasets: [{ data: Object.values(gs), backgroundColor: Object.keys(gs).map(l=>G_COLORS[l]), borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }});

            // Units
            const uStats = {};
            (g === 'ALL' ? Object.keys(G_COLORS) : [g]).forEach(gn => {
                const node = biDetails[2026] && biDetails[2026][m] && biDetails[2026][m][gn];
                if(node) Object.entries(node.units).forEach(([k,v]) => uStats[k] = (uStats[k]||0)+v);
            });
            const sortedU = Object.entries(uStats).sort((a,b)=>b[1]-a[1]).slice(0,5);
            document.getElementById('uGrid').innerHTML = sortedU.map(([n,v]) => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><p class="text-[9px] font-black text-slate-500 uppercase truncate w-64 font-bold italic">${n}</p><p class="text-xs font-black text-emerald-600">${v.toLocaleString()}</p></div>`).join('');
        }
        window.onload = start;
    </script>
</body>
</html>
