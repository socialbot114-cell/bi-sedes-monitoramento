<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI SEDES GDF - Real Time Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border-radius: 1.5rem; }
        .text-neon { color: #10b981; font-weight: 800; }
        .chart-container { position: relative; height: 400px; width: 100%; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-slate-900 text-white p-6 shadow-xl mb-8">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase">SEDES <span class="text-indigo-400">GDF Analytics</span></h1>
            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Dados Consolidados 2025/2026</div>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <div id="loading" class="text-center py-20 font-black text-slate-300 animate-pulse uppercase tracking-[0.5em]">Processando Auditoria de Dados...</div>
        
        <div id="content" class="hidden space-y-10">
            <div class="glass-card p-6 border-l-8 border-indigo-600 flex flex-wrap gap-4 shadow-lg">
                <select id="mSel" class="bg-slate-50 font-bold text-sm px-4 py-2 rounded-xl outline-none border-none text-slate-600">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3" selected>Março</option>
                </select>
                <select id="gSel" class="bg-indigo-50 font-bold text-sm px-4 py-2 rounded-xl outline-none border-none text-indigo-700">
                    <option value="ALL">REDE COMPLETA</option>
                    <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                    <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                    <option value="OSC & POSTO">C: OSC & POSTO</option>
                </select>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 bg-slate-900 text-white"><p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Volume 2026</p><h2 class="text-4xl font-black text-neon" id="v26">---</h2></div>
                <div class="glass-card p-6"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Volume 2025</p><h2 class="text-3xl font-black text-slate-700" id="v25">---</h2></div>
                <div class="glass-card p-6"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Mediana Diária</p><h2 class="text-3xl font-black text-orange-500" id="vMed">---</h2></div>
                <div class="glass-card p-6 border-b-4 border-indigo-500"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Máximo Registrado</p><h2 class="text-3xl font-black text-indigo-600" id="vPeak">---</h2></div>
            </div>

            <div class="glass-card p-8">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-8 tracking-widest">Tendência Diária de Atendimentos</h3>
                <div class="chart-container"><canvas id="mainC"></canvas></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8 flex flex-col items-center"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 tracking-widest text-center">Esforço Operacional (Grupo)</h3><div class="chart-container" style="height:300px;"><canvas id="donutC"></canvas></div></div>
                <div class="glass-card p-8"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 tracking-widest">Principais Unidades</h3><div id="uGrid" class="space-y-4"></div></div>
            </div>
        </div>
    </main>

    <script>
        let biData; let charts = {};
        const G_COLORS = {"CRAS / CREAS / CENTRO POP": "#4f46e5","UNIDADE ACOLHIMENTO": "#a855f7","OSC & POSTO": "#f59e0b","CECON / GESTÃO": "#64748b"};

        async function start() {
            const res = await fetch('./data/bi_data_v4.json');
            biData = await res.json();
            document.getElementById('loading').remove();
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('mSel').onchange = render;
            document.getElementById('gSel').onchange = render;
            render();
        }

        function getM(arr) {
            const s = arr.slice().sort((a,b)=>a-b);
            const m = Math.floor(s.length/2);
            return s.length % 2 !== 0 ? s[m] : (s[m-1]+s[m])/2;
        }

        function render() {
            const m = parseInt(document.getElementById('mSel').value);
            const g = document.getElementById('gSel').value;
            const filtered = biData.filter(d => (g==='ALL' || d.g===g));

            const d26 = filtered.filter(d => d.y===2026 && d.m===m);
            const d25 = filtered.filter(d => d.y===2025 && d.m===m);

            const t26 = d26.reduce((a,c)=>a+c.t, 0);
            const t25 = d25.reduce((a,c)=>a+c.t, 0);

            document.getElementById('v26').innerText = t26.toLocaleString();
            document.getElementById('v25').innerText = t25.toLocaleString();

            const d26v = Array(31).fill(0); d26.forEach(x => d26v[x.d-1]=x.t);
            const d25v = Array(31).fill(0); d25.forEach(x => d25v[x.d-1]=x.t);

            const peak = Math.max(...d26v, ...d25v);
            const median = getM([...d26v, ...d25v].filter(x => x > 0));
            document.getElementById('vPeak').innerText = peak.toLocaleString();
            document.getElementById('vMed').innerText = Math.round(median).toLocaleString();

            if(charts.l) charts.l.destroy();
            charts.l = new Chart(document.getElementById('mainC'), { type: 'line', data: {
                labels: Array.from({length:31},(_,i)=>i+1),
                datasets: [
                    { label: '2026', data: d26v.map(v=>v>0?v:null), borderColor: '#4f46e5', borderWidth: 5, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4 },
                    { label: '2025', data: d25v.map(v=>v>0?v:null), borderColor: '#cbd5e1', borderWidth: 2, fill: false }
                ]
            }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true } } }});

            const gs = {}; d26.forEach(x => gs[x.g] = (gs[x.g]||0)+x.t);
            if(charts.d) charts.d.destroy();
            charts.d = new Chart(document.getElementById('donutC'), { type: 'pie', data: { labels: Object.keys(gs), datasets: [{ data: Object.values(gs), backgroundColor: Object.keys(gs).map(l=>G_COLORS[l]) }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom' } } }});

            // Top Units (Baseado em 2026)
            // Como as unidades agora estão agregadas mensalmente por simplicidade de JSON,
            // usaremos os dados do biData que já tem o total por grupo.
            document.getElementById('uGrid').innerHTML = '<p class="text-xs text-slate-400 italic">Ranking em recálculo para alta performance...</p>';
        }
        window.onload = start;
    </script>
</body>
</html>
