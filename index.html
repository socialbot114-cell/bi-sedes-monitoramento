<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Multi-View BI - SEDES GDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.5); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05); border-radius: 1.5rem; transition: all 0.3s ease; }
        .view-switcher { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .active-view-btn { background: #4f46e5; color: white; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); }
        .hidden-view { display: none !important; }
        .text-neon { color: #bef264; text-shadow: 0 0 15px rgba(190, 242, 100, 0.4); }
        #map { height: 500px; width: 100%; border-radius: 1.5rem; z-index: 10; }
    </style>
</head>
<body class="text-slate-900 pb-32">

    <header class="sticky top-0 z-50 bg-white/70 backdrop-blur-xl border-b border-slate-200/50 p-6 shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
            <div>
                <span class="bg-indigo-100 text-indigo-600 px-4 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-2 inline-block italic text-xs">SEDES Intelligence v12.0</span>
                <h1 class="text-2xl md:text-3xl font-black tracking-tighter text-slate-900 italic uppercase leading-none">Dashboard <span class="text-indigo-600 underline decoration-indigo-200">SEDES GDF</span></h1>
            </div>
            <div id="statusAlert" class="hidden bg-orange-500 text-white px-6 py-2 rounded-2xl text-xs font-black animate-pulse shadow-lg">⚠️ MODO HISTÓRICO ATIVO</div>
        </div>
    </header>

    <main class="container mx-auto px-6 mt-12">

        <!-- ================= VIEW MENSAL ================= -->
        <div id="viewMensal" class="space-y-12">
            <div class="glass-card p-6 border-l-8 border-indigo-600 flex flex-wrap items-center gap-6 shadow-xl">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Mês de Análise</label>
                    <select id="monthSelectorM" class="bg-slate-100 font-bold text-sm px-6 py-3 rounded-2xl border-none outline-none cursor-pointer text-slate-700">
                        <option value="1">Janeiro</option><option value="2">Fevereiro</option>
                        <option value="3" selected>Março</option><option value="4">Abril</option>
                        <option value="5">Maio</option><option value="6">Junho</option>
                        <option value="7">Julho</option><option value="8">Agosto</option>
                        <option value="9">Setembro</option><option value="10">Outubro</option>
                        <option value="11">Novembro</option><option value="12">Dezembro</option>
                    </select>
                </div>
                <div class="h-12 w-px bg-slate-200 mx-2"></div>
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Filtro de Grupo</label>
                    <select id="groupSelectorM" class="bg-indigo-50 font-bold text-sm px-6 py-3 rounded-2xl border-none outline-none cursor-pointer text-indigo-600">
                        <option value="ALL">TODOS OS GRUPOS</option>
                        <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                        <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                        <option value="OSC & POSTO">C: OSC & POSTO</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 bg-slate-900 text-white shadow-2xl"><p class="text-[9px] font-black text-slate-500 uppercase mb-1 tracking-widest">Volume Atual (2026)</p><h2 class="text-4xl font-black text-neon" id="m-2026">---</h2><div id="m-var" class="text-[10px] font-bold mt-2 tracking-tight">---</div></div>
                <div class="glass-card overflow-hidden grid grid-cols-2 divide-x divide-slate-100 p-0 border-b-4 border-purple-500"><div class="p-6 text-center"><p class="text-[8px] font-black text-slate-400 uppercase mb-1">Vol 2025</p><h2 class="text-xl font-black text-slate-700" id="m-2025">---</h2></div><div class="p-6 text-center"><p class="text-[8px] font-black text-slate-400 uppercase mb-1">Vol 2024</p><h2 class="text-xl font-black text-slate-700" id="m-2024">---</h2></div></div>
                <div class="glass-card p-6 border-b-4 border-orange-500"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Mediana Diária</p><h2 class="text-3xl font-black text-orange-500" id="m-median">---</h2></div>
                <div class="glass-card p-6 border-b-4 border-emerald-500"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Média Histórica</p><h2 class="text-3xl font-black text-emerald-500" id="m-avg">---</h2></div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="glass-card lg:col-span-8 p-8"><canvas id="lineChartMensal" height="400"></canvas></div>
                <div class="lg:col-span-4 glass-card p-8 flex flex-col justify-center"><canvas id="donutChart" height="250"></canvas><div id="donutLegend" class="mt-6 grid grid-cols-2 gap-2"></div></div>
            </div>
        </div>

        <!-- ================= VIEW ANUAL ================= -->
        <div id="viewAnual" class="hidden-view space-y-12">
            <div class="glass-card p-6 border-l-8 border-neon flex items-center gap-6 shadow-xl bg-slate-900 text-white">
                <div class="flex flex-col gap-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Filtro Global</label>
                    <select id="groupSelectorA" class="bg-white/5 font-bold text-sm px-6 py-3 rounded-2xl border border-white/10 outline-none cursor-pointer text-neon">
                        <option value="ALL" class="text-slate-900">REDE COMPLETA (VISÃO ANUAL)</option>
                        <option value="CRAS / CREAS / CENTRO POP" class="text-slate-900">A: CRAS & CREAS</option>
                        <option value="UNIDADE ACOLHIMENTO" class="text-slate-900">B: UNIDADE ACOLHIMENTO</option>
                        <option value="OSC & POSTO" class="text-slate-900">C: OSC & POSTO</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 border-l-8 border-slate-300"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total 2024</p><h2 class="text-3xl font-black text-slate-700">813.878</h2></div>
                <div class="glass-card p-6 border-l-8 border-slate-500"><p class="text-[9px] font-black text-slate-400 uppercase tracking-widest">Total 2025</p><h2 class="text-3xl font-black text-slate-700">864.676</h2></div>
                <div class="glass-card p-6 border-l-8 border-indigo-500 bg-indigo-50"><p class="text-[9px] font-black text-indigo-400 uppercase tracking-widest">Acumulado 2026</p><h2 class="text-3xl font-black text-indigo-600">161.924</h2></div>
                <div class="glass-card p-6 border-l-8 border-[#bef264] bg-slate-900 text-white shadow-xl"><p class="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">Crescimento YTD</p><h2 class="text-3xl font-black text-neon" id="ytd-var">---</h2></div>
            </div>
            <div id="mapContainer" class="glass-card p-10"><h3 class="text-lg font-black text-slate-800 mb-8 uppercase italic text-center">Mapa de Inteligência Geográfica</h3><div id="map"></div></div>
        </div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] view-switcher p-2 flex gap-2">
        <button onclick="switchView('mensal')" id="btnMensal" class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest active-view-btn">MENSAL</button>
        <button onclick="switchView('anual')" id="btnAnual" class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest text-white/40">ANUAL</button>
    </div>

    <script>
        let charts = {}; let biData; let unitMapping; let map;
        const RA_COORDS = {"CEILANDIA": [-15.8202, -48.1130], "GAMA": [-16.0181, -48.0675], "TAGUATINGA": [-15.8333, -48.0500], "SAMAMBAIA": [-15.8814, -48.0875], "PLANALTINA": [-15.6175, -47.6531], "PARANOA": [-15.7725, -47.7789], "SAO SEBASTIAO": [-15.9103, -47.7753], "BRASILIA": [-15.7942, -47.8822], "GUARA": [-15.8239, -47.9781], "RECANTO DAS EMAS": [-15.9011, -48.0672], "SANTA MARIA": [-16.0203, -47.9856], "SOBRADINHO": [-15.6531, -47.7886]};
        const GROUP_COLORS = {"CRAS / CREAS / CENTRO POP": "#4f46e5","UNIDADE ACOLHIMENTO": "#a855f7","OSC & POSTO": "#f59e0b","CECON / CONVIVÊNCIA": "#10b981","OUTROS / GESTÃO": "#64748b"};

        async function init() {
            const res = await fetch('./data/bi_data_v3.json');
            biData = await res.json();
            
            // Listeners diretos e simples
            document.getElementById('monthSelectorM').onchange = updateDashboard;
            document.getElementById('groupSelectorM').onchange = updateDashboard;
            document.getElementById('groupSelectorA').onchange = updateDashboard;

            updateDashboard();
        }

        function switchView(view) {
            document.getElementById('viewMensal').classList.toggle('hidden-view', view !== 'mensal');
            document.getElementById('viewAnual').classList.toggle('hidden-view', view !== 'anual');
            document.getElementById('btnMensal').className = view === 'mensal' ? 'px-10 py-3 rounded-full text-[10px] font-black active-view-btn' : 'px-10 py-3 rounded-full text-[10px] font-black text-white/40';
            document.getElementById('btnAnual').className = view === 'anual' ? 'px-10 py-3 rounded-full text-[10px] font-black active-view-btn' : 'px-10 py-3 rounded-full text-[10px] font-black text-white/40';
            if (view === 'anual') { if(!map) initMap(); setTimeout(()=>map.invalidateSize(), 200); }
            updateDashboard();
        }

        function initMap() {
            map = L.map('map').setView([-15.7942, -47.8822], 10);
            L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
        }

        function updateDashboard() {
            const isAnual = !document.getElementById('viewAnual').classList.contains('hidden-view');
            const m = parseInt(document.getElementById('monthSelectorM').value);
            const g = isAnual ? document.getElementById('groupSelectorA').value : document.getElementById('groupSelectorM').value;

            // Filtro Principal
            const filtered = biData.filter(d => (g === 'ALL' || d.g === g));
            
            // KPIs Mensais
            const currentMonthData = filtered.filter(d => d.y === 2026 && d.m === m);
            const t26 = currentMonthData.reduce((acc, c) => acc + c.t, 0);
            const t25 = filtered.filter(d => d.y === 2025 && d.m === m).reduce((acc, c) => acc + c.t, 0);
            const t24 = filtered.filter(d => d.y === 2024 && d.m === m).reduce((acc, c) => acc + c.t, 0);

            document.getElementById('m-2026').innerText = t26.toLocaleString();
            document.getElementById('m-2025').innerText = t25.toLocaleString();
            document.getElementById('m-2024').innerText = t24.toLocaleString();

            const avgComp = (t25 + t24) / 2;
            if(avgComp > 0) {
                const diff = ((t26 - avgComp)/avgComp*100).toFixed(1);
                document.getElementById('m-var').innerText = `${diff > 0 ? '↑' : '↓'} ${Math.abs(diff)}% vs Biênio`;
                document.getElementById('m-var').style.color = diff > 0 ? '#bef264' : '#fb7185';
            }

            // Charts
            updateCharts(m, g, isAnual);
        }

        function updateCharts(m, g, isAnual) {
            const filtered = biData.filter(d => (g === 'ALL' || d.g === g));
            const getYearly = (year) => { const res = Array(31).fill(0); filtered.filter(d => d.y === year && d.m === m).forEach(d => { res[d.d-1] += d.t; }); return res.map(v => v>0?v:null); };
            
            if (charts.lineM) charts.lineM.destroy();
            charts.lineM = new Chart(document.getElementById('lineChartMensal'), {
                type: 'line', data: { labels: Array.from({length:31}, (_,i)=>i+1), datasets: [
                    { label: '2026', data: getYearly(2026), borderColor: '#4f46e5', borderWidth: 4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4 },
                    { label: '2025', data: getYearly(2025), borderColor: '#cbd5e1', borderWidth: 2, fill: false }
                ]}, options: { responsive: true, maintainAspectRatio: false }
            });

            const groupStats = {}; filtered.filter(d => d.y === 2026 && d.m === m).forEach(d => { groupStats[d.g] = (groupStats[d.g] || 0) + d.t; });
            const labels = Object.keys(groupStats); const data = Object.values(groupStats);
            if (charts.donut) charts.donut.destroy();
            charts.donut = new Chart(document.getElementById('donutChart'), { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: labels.map(l => GROUP_COLORS[l]) }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        }

        window.onload = init;
    </script>
</body>
</html>
