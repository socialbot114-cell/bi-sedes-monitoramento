<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensal - BI SEDES GDF</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-text-size-adjust: none !important; text-size-adjust: none !important; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass-card { background: white; border: 1px solid #e2e8f0; border-radius: 1.25rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .active-pill { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="pb-32">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-5">
        <div class="container mx-auto flex justify-between items-center text-xs md:text-sm">
            <h1 class="font-black italic uppercase tracking-tighter text-slate-800">SEDES <span class="text-indigo-600">GDF Analytics</span></h1>
            <div class="bg-indigo-600 text-white px-4 py-1 rounded-full font-bold">VISTA MENSAL</div>
        </div>
    </header>

    <main class="container mx-auto px-6 mt-8 space-y-10">
        <div class="glass-card p-5 flex flex-wrap items-center gap-6 border-l-4 border-indigo-600 shadow-lg">
            <select id="mSel" class="bg-slate-50 font-bold text-sm px-4 py-2 rounded-xl outline-none border-none text-slate-600 cursor-pointer">
                <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
                <option value="4" selected>Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
            <select id="gSel" class="bg-indigo-50 font-bold text-sm px-4 py-2 rounded-xl outline-none border-none text-indigo-700 cursor-pointer">
                <option value="ALL">REDE COMPLETA</option>
                <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                <option value="OSC & POSTO">C: OSC & POSTO</option>
            </select>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-5">
            <div class="glass-card p-6 bg-slate-900 text-white shadow-2xl"><p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Volume 2026</p><h2 class="text-3xl font-black text-[#bef264]" id="v26">---</h2><div id="vVar" class="text-[10px] font-bold mt-1">---</div></div>
            <div class="glass-card p-6 border-b-4 border-purple-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Vol. 2025</p><h2 class="text-3xl font-black text-slate-700" id="v25Full">---</h2></div>
            <div class="glass-card p-6 border-b-4 border-orange-400"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1 text-orange-500 italic">Acumulado 2026</p><h2 class="text-3xl font-black text-slate-800">183.134</h2></div>
            <div class="glass-card p-6 border-b-4 border-emerald-500"><p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Projeção</p><h2 class="text-3xl font-black text-emerald-600" id="vProj">---</h2></div>
        </div>

        <div class="glass-card p-8 flex flex-col"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic">Atividade Diária (YoY)</h3><div class="chart-container"><canvas id="mainC"></canvas></div></div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 text-xs">
            <div class="glass-card p-8"><h3 class="font-black text-slate-400 uppercase mb-6 italic">Perfis de Servidores</h3><div id="pGrid" class="space-y-3"></div></div>
            <div class="glass-card p-8"><h3 class="font-black text-slate-400 uppercase mb-6 italic">Principais Unidades</h3><div id="uGrid" class="space-y-3"></div></div>
        </div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 p-2 rounded-full shadow-2xl flex gap-2">
        <a href="index.html" class="px-10 py-3 rounded-full text-[10px] font-black uppercase active-pill transition-all">MENSAL</a>
        <a href="anual.html" class="px-10 py-3 rounded-full text-[10px] font-black uppercase text-white/40 hover:text-white transition-all">ANUAL</a>
    </div>

    <footer class="bg-slate-100 py-10 mt-20 text-center text-[10px] font-bold uppercase text-slate-400 border-t border-slate-200">
        SEDES GDF - Secretaria de Estado de Desenvolvimento Social <br> Brasília-DF | Ouvidoria: 162
    </footer>

    <script>
        let biData, biDetails, charts = {};
        async function start() {
            try {
                const [d, dt] = await Promise.all([fetch('./data/bi_data_v4.json').then(r=>r.json()), fetch('./data/bi_details_v4.json').then(r=>r.json())]);
                biData = d; biDetails = dt;
                document.getElementById('mSel').onchange = render;
                document.getElementById('gSel').onchange = render;
                render();
            } catch (e) { console.error(e); }
        }
        function getM(arr) { const s = arr.slice().sort((a,b)=>a-b); const mid = Math.floor(s.length/2); return s.length % 2 !== 0 ? s[mid] : (s[mid-1]+s[mid])/2; }
        function render() {
            const m = parseInt(document.getElementById('mSel').value);
            const g = document.getElementById('gSel').value;
            const filtered = biData.filter(d => (g==='ALL' || d.g === g));
            const getV = (year) => { const r = Array(31).fill(0); const c = Array(31).fill(0); filtered.filter(d => d.y===year && d.m===m).forEach(x => { r[x.d-1]+=x.t; c[x.d-1]=1; }); return {v: r, c: c}; };
            const d26 = getV(2026); const d25 = getV(2025);
            const t26 = d26.v.reduce((a,b)=>a+b, 0); const t25F = d25.v.reduce((a,b)=>a+b, 0);
            const maxD26 = d26.c.filter(x=>x===1).length;
            document.getElementById('v26').innerText = t26.toLocaleString();
            document.getElementById('v25Full').innerText = t25F.toLocaleString();
            const mVal = getM([...d25.v].filter(x => x > 0)) || 0;
            document.getElementById('vMed').innerText = Math.round(mVal).toLocaleString();
            const t25Comp = d25.v.slice(0, maxD26 || 31).reduce((a,b)=>a+b, 0);
            if(t25Comp > 0 && t26 > 0) { const diff = (((t26/t25Comp)-1)*100).toFixed(1); document.getElementById('vVar').innerText = (diff>0?'+':'') + diff + '% vs 2025'; }
            document.getElementById('vProj').innerText = maxD26 > 0 ? Math.round((t26/maxD26)*30).toLocaleString() : "---";
            if(charts.l) charts.l.destroy();
            charts.l = new Chart(document.getElementById('mainC'), { type: 'line', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [{ label: 'Meta', data: Array(31).fill(mVal), borderColor: '#f97316', borderDash: [5, 5], borderWidth: 1, pointRadius: 0, fill: false }, { label: '2026', data: d26.v.map((v,i)=>d26.c[i]?v:null), borderColor: '#4f46e5', borderWidth: 5, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4 }, { label: '2025', data: d25.v.map((v,i)=>d25.c[i]?v:null), borderColor: '#cbd5e1', borderWidth: 2, fill: false }] }, options: { responsive: true, maintainAspectRatio: false }});
            const pS = {}; const uS = {}; const yearKey = t26 > 0 ? 2026 : 2025;
            const gps = g === 'ALL' ? ["CRAS / CREAS / CENTRO POP", "UNIDADE ACOLHIMENTO", "OSC & POSTO", "CECON / GESTÃO"] : [g];
            gps.forEach(gn => { const n = biDetails[yearKey] && biDetails[yearKey][m] && biDetails[yearKey][m][gn]; if(n) { Object.entries(n.profiles).forEach(([k,v]) => pS[k] = (pS[k]||0)+v); Object.entries(n.units).forEach(([k,v]) => uS[k] = (uS[k]||0)+v); } });
            const rG = (data, id, color) => { const s = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,5); document.getElementById(id).innerHTML = s.map(([k,v]) => `<div class="flex justify-between items-center p-3 border-b border-slate-50"><p class="truncate w-64">${k}</p><p class="font-black ${color}">${v.toLocaleString()}</p></div>`).join(''); };
            rG(pS, 'pGrid', 'text-indigo-600'); rG(uS, 'uGrid', 'text-emerald-600');
        }
        window.onload = start;
    </script>
</body>
</html>
