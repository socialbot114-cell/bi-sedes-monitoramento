<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI SEDES GDF - Estabilizado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; overflow-x: hidden; }
        .chart-container { position: relative; height: 400px; width: 100%; } /* TRAVA DE ALTURA */
        .glass-card { background: white; border-radius: 1.5rem; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .view-switcher { background: #0f172a; padding: 0.5rem; border-radius: 2rem; }
        .active-view-btn { background: #bef264; color: #0f172a; font-weight: 800; }
        .hidden-view { display: none !important; }
        #map { height: 500px; width: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="text-slate-900 pb-32">

    <header class="bg-slate-900 text-white p-6 shadow-xl mb-10">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black tracking-widest uppercase">SEDES <span class="text-indigo-400">GDF Analytics</span></h1>
            <div class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Dados Atualizados: 23/03/2026</div>
        </div>
    </header>

    <main class="container mx-auto px-6">
        <div id="viewMensal" class="space-y-12">
            <!-- Filtros -->
            <div class="glass-card p-6 flex flex-wrap items-center gap-6 border-l-8 border-indigo-600 shadow-lg">
                <select id="monthSelect" class="bg-slate-100 font-bold text-sm px-6 py-2 rounded-xl outline-none border-none">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3" selected>Março</option>
                </select>
                <select id="groupSelect" class="bg-indigo-50 font-bold text-sm px-6 py-2 rounded-xl outline-none border-none text-indigo-700">
                    <option value="ALL">REDE COMPLETA</option>
                    <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                    <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                    <option value="OSC & POSTO">C: OSC & POSTO</option>
                </select>
            </div>

            <!-- KPIs -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                <div class="glass-card p-6 bg-slate-900 text-white"><p class="text-[10px] text-slate-500 uppercase mb-1">Volume 2026</p><h2 class="text-4xl font-black text-[#bef264]" id="kpi-26">---</h2><div id="kpi-var" class="text-[10px] font-bold mt-2">---</div></div>
                <div class="glass-card p-6"><p class="text-[10px] text-slate-400 uppercase mb-1">Volume 2025</p><h2 class="text-3xl font-black text-slate-700" id="kpi-25">---</h2></div>
                <div class="glass-card p-6"><p class="text-[10px] text-slate-400 uppercase mb-1 text-orange-500">Atenção Mediana</p><h2 class="text-3xl font-black text-orange-500" id="kpi-med">---</h2></div>
                <div class="glass-card p-6 border-b-4 border-indigo-600"><p class="text-[10px] text-slate-400 uppercase mb-1">Capacidade Total</p><h2 class="text-3xl font-black text-indigo-600" id="kpi-cap">---</h2></div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="glass-card lg:col-span-8 p-8 flex flex-col">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest">Atividade Diária (YoY)</h3>
                    <div class="chart-container"><canvas id="mainChart"></canvas></div>
                </div>
                <div class="lg:col-span-4 glass-card p-8 flex flex-col">
                    <h3 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest text-center">Esforço por Grupo</h3>
                    <div class="chart-container" style="height:300px;"><canvas id="donutChart"></canvas></div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8"><h3 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest italic">Top Perfis de Servidores</h3><div id="profileGrid" class="space-y-4"></div></div>
                <div class="glass-card p-8"><h3 class="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest italic">Top 5 Unidades Executoras</h3><div id="unitsGrid" class="space-y-4"></div></div>
            </div>
        </div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] view-switcher p-2 flex gap-2">
        <button class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest active-view-btn">MENSAL</button>
        <button class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest text-white/40">ANUAL (Em Manutenção)</button>
    </div>

    <script>
        let biData; let charts = {};
        const GROUP_COLORS = {"CRAS / CREAS / CENTRO POP": "#4f46e5","UNIDADE ACOLHIMENTO": "#a855f7","OSC & POSTO": "#f59e0b","CECON / GESTÃO": "#64748b"};

        async function start() {
            try {
                const res = await fetch('./data/bi_data_v4.json');
                biData = await res.json();
                document.getElementById('monthSelect').onchange = render;
                document.getElementById('groupSelect').onchange = render;
                render();
            } catch (e) { console.error("Erro ao carregar dados", e); }
        }

        function render() {
            const m = parseInt(document.getElementById('monthSelect').value);
            const g = document.getElementById('groupSelect').value;
            const filtered = biData.filter(d => (g==='ALL' || d.g === g));

            const t26 = filtered.filter(d => d.y===2026 && d.m===m).reduce((a,c)=>a+c.t,0);
            const t25 = filtered.filter(d => d.y===2025 && d.m===m).reduce((a,c)=>a+c.t,0);
            document.getElementById('kpi-26').innerText = t26.toLocaleString();
            document.getElementById('kpi-25').innerText = t25.toLocaleString();

            const days26 = filtered.filter(d => d.y===2026 && d.m===m && d.t>0).map(d=>d.d);
            const maxD = days26.length>0 ? Math.max(...days26) : 0;
            const t25Comp = filtered.filter(d => d.y===2025 && d.m===m && d.d<=maxD).reduce((a,c)=>a+c.t,0);
            if(t25Comp>0) {
                const diff = ((t26-t25Comp)/t25Comp*100).toFixed(1);
                document.getElementById('kpi-var').innerText = `${diff>0?'↑':''} ${diff}% vs 2025`;
                document.getElementById('kpi-var').style.color = diff>0?'#bef264':'#fb7185';
            }

            // Gráfico Principal (Fixed Height)
            if(charts.main) charts.main.destroy();
            const getD = (y) => { const r = Array(31).fill(0); filtered.filter(d => d.y===y && d.m===m).forEach(d => r[d.d-1]=d.t); return r.map(v=>v>0?v:null); };
            charts.main = new Chart(document.getElementById('mainChart'), { type: 'line', data: { labels: Array.from({length:31},(_,i)=>i+1), datasets: [
                { label: '2026', data: getD(2026), borderColor: '#4f46e5', borderWidth: 4, tension: 0.4, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)' },
                { label: '2025', data: getD(2025), borderColor: '#cbd5e1', borderWidth: 2, fill: false }
            ]}, options: { responsive: true, maintainAspectRatio: false }});

            // Donut
            if(charts.donut) charts.donut.destroy();
            const gs = {}; filtered.filter(d => d.y===2026 && d.m===m).forEach(d => gs[d.g] = (gs[d.g]||0)+d.t);
            charts.donut = new Chart(document.getElementById('donutChart'), { type: 'pie', data: { labels: Object.keys(gs), datasets: [{ data: Object.values(gs), backgroundColor: Object.keys(gs).map(l=>GROUP_COLORS[l]) }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true, position: 'bottom' } } }});

            // Perfis e Unidades
            const ps = {}; const us = {};
            filtered.filter(d => d.y===2026 && d.m===m).forEach(d => d.u.forEach(u => {
                us[u.n] = (us[u.n]||0)+u.t;
                Object.entries(u.p).forEach(([k,v]) => ps[k]=(ps[k]||0)+v);
            }));
            const sortedP = Object.entries(ps).sort((a,b)=>b[1]-a[1]).slice(0,5);
            document.getElementById('profileGrid').innerHTML = sortedP.map(([k,v]) => `<div class="flex justify-between items-center text-[10px] font-bold border-b border-slate-50 py-2"><p class="text-slate-500 uppercase truncate w-64">${k}</p><p class="text-slate-800">${v.toLocaleString()}</p></div>`).join('');
            
            const sortedU = Object.entries(us).sort((a,b)=>b[1]-a[1]).slice(0,5);
            document.getElementById('unitsGrid').innerHTML = sortedU.map(([n,t]) => `<div class="flex justify-between items-center text-[10px] font-bold border-b border-slate-50 py-2"><p class="text-indigo-600 uppercase truncate w-64">${n}</p><p class="text-slate-800">${t.toLocaleString()}</p></div>`).join('');
        }
        window.onload = start;
    </script>
</body>
</html>
