<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BI Enterprise - SEDES GDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: white; border: 1px solid #e2e8f0; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border-radius: 1.5rem; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        .active-pill { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3); }
    </style>
</head>
<body class="text-slate-900 pb-20">

    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl border-b border-slate-200 p-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black italic uppercase tracking-tighter">Portal <span class="text-indigo-600">SEDES GDF</span> Intelligence</h1>
            <div id="statusTag" class="bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold animate-pulse">MODO REAL-TIME</div>
        </div>
    </header>

    <main class="container mx-auto px-6 mt-10">
        <!-- Painel de Controle -->
        <div class="glass-card p-6 flex flex-wrap items-center gap-6 mb-10 border-l-8 border-indigo-600">
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Mês de Referência</label>
                <select id="mSel" class="bg-slate-50 font-bold text-sm px-6 py-2 rounded-xl outline-none border-none text-slate-600">
                    <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3" selected>Março</option>
                    <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
                    <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
                    <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
                </select>
            </div>
            <div class="flex flex-col gap-1">
                <label class="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Filtro de Rede</label>
                <select id="gSel" class="bg-indigo-50 font-bold text-sm px-6 py-2 rounded-xl outline-none border-none text-indigo-700">
                    <option value="ALL">REDE COMPLETA (MÉTRICA GLOBAL)</option>
                    <option value="CRAS / CREAS / CENTRO POP">A: CRAS & CREAS</option>
                    <option value="UNIDADE ACOLHIMENTO">B: ACOLHIMENTO</option>
                    <option value="OSC & POSTO">C: OSC & POSTO</option>
                </select>
            </div>
        </div>

        <!-- KPIs -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass-card p-6 bg-slate-900 text-white shadow-2xl">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Volume 2026</p>
                <h2 class="text-4xl font-black text-[#bef264]" id="v26">---</h2>
                <div id="vVar" class="text-[10px] font-bold mt-2">---</div>
            </div>
            <div class="glass-card p-6"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Volume 2025</p><h2 class="text-3xl font-black text-slate-700" id="v25">---</h2></div>
            <div class="glass-card p-6 border-b-4 border-orange-400"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Mediana Diária</p><h2 class="text-3xl font-black text-orange-500" id="vMed">---</h2></div>
            <div class="glass-card p-6 border-b-4 border-indigo-600"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Pico do Mês</p><h2 class="text-3xl font-black text-indigo-600" id="vPeak">---</h2></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 mb-12">
            <div class="glass-card lg:col-span-8 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-10 tracking-[0.2em] italic">Timeline de Produção YoY</h3>
                <div class="chart-container"><canvas id="mainC"></canvas></div>
            </div>
            <div class="lg:col-span-4 glass-card p-10 flex flex-col justify-center">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-8 tracking-[0.2em] text-center italic">Esforço por Grupo</h3>
                <div class="chart-container" style="height:300px;"><canvas id="donutC"></canvas></div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div class="glass-card p-10">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic">Distribuição de Força de Trabalho (Perfis)</h3>
                <div id="pGrid" class="space-y-4"></div>
            </div>
            <div class="glass-card p-10">
                <h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic">Top 5 Unidades Executoras</h3>
                <div id="uGrid" class="space-y-4"></div>
            </div>
        </div>
    </main>

    <script>
        let biData; let biDetails; let charts = {};
        const G_COLORS = {"CRAS / CREAS / CENTRO POP": "#4f46e5","UNIDADE ACOLHIMENTO": "#a855f7","OSC & POSTO": "#f59e0b","CECON / GESTÃO": "#64748b"};

        async function start() {
            const [dRes, detRes] = await Promise.all([fetch('./data/bi_data_v4.json'), fetch('./data/bi_details_v4.json')]);
            biData = await dRes.json();
            biDetails = await detRes.json();
            document.getElementById('mSel').onchange = render;
            document.getElementById('gSel').onchange = render;
            render();
        }

        function render() {
            const m = parseInt(document.getElementById('mSel').value);
            const g = document.getElementById('gSel').value;
            const filtered = biData.filter(d => (g==='ALL' || d.g === g));

            const d26 = filtered.filter(d => d.y===2026 && d.m===m);
            const d25 = filtered.filter(d => d.y===2025 && d.m===m);

            // CORREÇÃO: Soma acumulativa por dia (Impede sobreposição na Rede Completa)
            const getDV = (data) => {
                const r = Array(31).fill(0);
                data.forEach(x => { r[x.d-1] += x.t; }); // USANDO += PARA SOMAR GRUPOS
                return r;
            };

            const d26v = getDV(d26); const d25v = getDV(d25);
            const t26 = d26v.reduce((a,b)=>a+b, 0);
            const t25 = d25v.reduce((a,b)=>a+b, 0);

            const isFuture = t26 === 0;
            document.getElementById('statusTag').innerText = isFuture ? "MODO PLANEJAMENTO" : "MODO REAL-TIME";
            document.getElementById('statusTag').className = isFuture ? "bg-orange-500 text-white px-4 py-1 rounded-full text-[10px] font-bold" : "bg-indigo-600 text-white px-4 py-1 rounded-full text-[10px] font-bold animate-pulse";

            document.getElementById('v26').innerText = t26.toLocaleString();
            document.getElementById('v25').innerText = t25.toLocaleString();

            if(t25 > 0 && !isFuture) {
                const diff = ((t26-t25)/t25*100).toFixed(1);
                document.getElementById('vVar').innerText = `${diff>0?'+':''}${diff}% vs 2025`;
            } else { document.getElementById('vVar').innerText = "N/A"; }

            // Mediana e Pico
            const allV = [...d26v, ...d25v].filter(x => x > 0);
            document.getElementById('vPeak').innerText = Math.max(...d26v, ...d25v).toLocaleString();
            if(allV.length > 0) {
                const s = allV.sort((a,b)=>a-b);
                const mid = Math.floor(s.length/2);
                const med = s.length % 2 !== 0 ? s[mid] : (s[mid-1]+s[mid])/2;
                document.getElementById('vMed').innerText = Math.round(med).toLocaleString();
            }

            // Charts
            if(charts.l) charts.l.destroy();
            charts.l = new Chart(document.getElementById('mainC'), { type: 'line', data: {
                labels: Array.from({length:31},(_,i)=>i+1),
                datasets: [
                    { label: '2026', data: d26v.map(v=>v>0?v:null), borderColor: '#4f46e5', borderWidth: 6, fill: true, backgroundColor: 'rgba(79, 70, 229, 0.05)', tension: 0.4 },
                    { label: '2025', data: d25v.map(v=>v>0?v:null), borderColor: '#cbd5e1', borderWidth: 2, fill: false, tension: 0.2 }
                ]
            }, options: { responsive: true, maintainAspectRatio: false }});

            if(charts.d) charts.d.destroy();
            const gs = {}; d26.forEach(x => gs[x.g] = (gs[x.g]||0)+x.t);
            const donutData = isFuture ? biData.filter(d=>d.y===2025 && d.m===m) : d26;
            const gsF = {}; donutData.forEach(x => gsF[x.g] = (gsF[x.g]||0)+x.t);

            charts.d = new Chart(document.getElementById('donutC'), { type: 'doughnut', data: { labels: Object.keys(gsF), datasets: [{ data: Object.values(gsF), backgroundColor: Object.keys(gsF).map(l=>G_COLORS[l]), borderWidth: 0 }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '80%' }});

            // Detalhes de Perfis e Unidades
            const yearKey = isFuture ? 2025 : 2026;
            const pStats = {}; const uStats = {};
            const groupsToScan = g === 'ALL' ? Object.keys(G_COLORS) : [g];
            
            groupsToScan.forEach(groupName => {
                const node = biDetails[yearKey] && biDetails[yearKey][m] && biDetails[yearKey][m][groupName];
                if(node) {
                    Object.entries(node.profiles).forEach(([k,v]) => pStats[k] = (pStats[k]||0)+v);
                    Object.entries(node.units).forEach(([k,v]) => uStats[k] = (uStats[k]||0)+v);
                }
            });

            const renderL = (data, id, color) => {
                const sorted = Object.entries(data).sort((a,b)=>b[1]-a[1]).slice(0,5);
                document.getElementById(id).innerHTML = sorted.map(([k,v]) => `<div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100"><p class="text-[9px] font-black text-slate-500 uppercase truncate w-64">${k}</p><p class="text-xs font-black ${color}">${v.toLocaleString()}</p></div>`).join('');
            };
            renderL(pStats, 'pGrid', 'text-indigo-600');
            renderL(uStats, 'uGrid', 'text-emerald-600');
        }
        window.onload = start;
    </script>
</body>
</html>
