<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anual - BI SEDES GDF</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-text-size-adjust: none; text-size-adjust: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
        #map { height: 600px; width: 100%; border-radius: 1rem; border: 4px solid white; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .active-pill { background: #4f46e5; color: white; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
    </style>
</head>
<body class="pb-32">
    <header class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100 p-5">
        <div class="container mx-auto flex justify-between items-center text-xs md:text-sm">
            <h1 class="font-black italic uppercase tracking-tighter text-slate-800">SEDES <span class="text-indigo-600">GDF Analytics</span></h1>
            <div class="bg-indigo-600 text-white px-4 py-1 rounded-full font-bold">VISTA ANUAL</div>
        </div>
    </header>

    <main class="container mx-auto px-6 mt-8 space-y-10">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="card p-6 border-l-8 border-slate-300"><p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Total 2025</p><h2 class="text-3xl font-black">864.676</h2></div>
            <div class="card p-6 border-l-8 border-indigo-600"><p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest">Acumulado 2026</p><h2 class="text-3xl font-black">179.029</h2></div>
            <div class="card p-6 border-l-8 border-emerald-500"><p class="text-[10px] font-bold text-emerald-600 uppercase tracking-widest">Meta Mensal</p><h2 class="text-3xl font-black">~65k</h2></div>
            <div class="card p-6 bg-slate-900 text-white shadow-xl"><p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Crescimento YoY</p><h2 class="text-3xl font-black text-[#bef264]">+5.4%</h2></div>
        </div>

        <div class="card p-10"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic text-center tracking-[0.2em]">Curva de Sazonalidade (Janeiro a Dezembro)</h3><div style="height:400px;"><canvas id="lineA"></canvas></div></div>

        <div class="card p-10"><h3 class="text-xs font-black text-slate-400 uppercase mb-8 italic text-center tracking-[0.2em]">Distribuição Geográfica (DF)</h3><div id="map"></div></div>
    </main>

    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 p-2 rounded-full shadow-2xl flex gap-2">
        <a href="index.html" class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest text-white/40 hover:text-white transition-all">MENSAL</a>
        <a href="anual.html" class="px-10 py-3 rounded-full text-[10px] font-black uppercase tracking-widest active-pill transition-all">ANUAL</a>
    </div>

    <footer class="bg-slate-100 py-10 mt-20 text-center text-[10px] font-bold uppercase text-slate-400 border-t border-slate-200">
        SEDES GDF - Secretaria de Estado de Desenvolvimento Social <br> Brasília-DF | Ouvidoria: 162
    </footer>

    <script>
        let biData, map;
        const RA_COORDS = {"CEILANDIA": [-15.8202, -48.1130], "GAMA": [-16.0181, -48.0675], "TAGUATINGA": [-15.8333, -48.0500], "SAMAMBAIA": [-15.8814, -48.0875], "PLANALTINA": [-15.6175, -47.6531], "PARANOA": [-15.7725, -47.7789], "SAO SEBASTIAO": [-15.9103, -47.7753], "BRASILIA": [-15.7942, -47.8822], "GUARA": [-15.8239, -47.9781]};
        async function start() {
            const res = await fetch('./data/bi_data_v4.json');
            biData = await res.json();
            map = L.map('map').setView([-15.7942, -47.8822], 10);
            L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            renderAnual();
        }
        function renderAnual() {
            const getM = (y) => { const r = Array(12).fill(0); biData.filter(d=>d.y===y).forEach(x=>r[x.m-1]+=x.t); return r.map((v,i)=>v>0?v:(y===2026 && i>=3?null:0)); };
            new Chart(document.getElementById('lineA'), { type:'line', data:{ labels:['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'], datasets:[
                {label:'2026', data:getM(2026), borderColor:'#4f46e5', borderWidth:5, tension:0.4, fill:true, backgroundColor:'rgba(79, 70, 229, 0.05)'},
                {label:'2025', data:getM(2025), borderColor:'#a855f7', borderWidth:2, tension:0.2, fill:false}
            ]}, options:{responsive:true, maintainAspectRatio:false}});
            const raS = {}; biData.filter(d=>d.y===2026).forEach(d=>{ d.u && d.u.forEach(u=>{ for(let r in RA_COORDS){ if(u.n.includes(r)){ raS[r]=(raS[r]||0)+u.t; break; } } }); });
            Object.entries(raS).forEach(([ra, t]) => L.circleMarker(RA_COORDS[ra], { radius: Math.sqrt(t)*0.4, fillColor:"#4f46e5", color:"#fff", weight:2, fillOpacity:0.7 }).addTo(map).bindPopup('<b>'+ra+'</b><br>2026: '+t.toLocaleString()));
        }
        window.onload = start;
    </script>
</body>
</html>
